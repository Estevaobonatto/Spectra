name: Release

# Disparado por push de qualquer tag v*.*.*  (ex: v2.0.1  v3.0.0-rc1)
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write   # criar GitHub Release
  id-token: write   # Trusted Publisher OIDC → PyPI (sem senha!)

jobs:
  # ── 1. Garante que a tag bate com a versão declarada no pyproject.toml ───────
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check version consistency
        id: check
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJECT=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          echo "Tag   : v$TAG"
          echo "pyproject.toml: $PYPROJECT"

          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "::error title=Version Mismatch::tag=v$TAG não bate com pyproject.toml=$PYPROJECT"
            echo "Atualize a versão em pyproject.toml, setup.py e CHANGELOG.md antes de tagear."
            exit 1
          fi

          # Detecta se é pré-release (ex: 2.1.0-rc1, 2.1.0-beta)
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # ── 2. Roda a suite de testes antes de publicar ──────────────────────────────
  test:
    name: Test Suite
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Build wheel + sdist ───────────────────────────────────────────────────
  build:
    name: Build Distribution
    needs: [validate, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # histórico completo (necessário p/ setuptools_scm se usado)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify distributions
        run: twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/
          retention-days: 7

  # ── 4. Cria a GitHub Release com os artefatos e notas do CHANGELOG ──────────
  github-release:
    name: GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/

      - name: Extract CHANGELOG entry
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          # Extrai bloco entre "## [X.Y.Z]" e o próximo "## ["
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d')
          if [ -z "$NOTES" ]; then
            NOTES="Veja [CHANGELOG.md](CHANGELOG.md) para detalhes."
          fi
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Spectra v${{ needs.validate.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease }}
          make_latest: ${{ needs.validate.outputs.prerelease == 'false' }}

  # ── 5. Publica no PyPI via Trusted Publisher (OIDC — sem senha armazenada) ──
  pypi-publish:
    name: Publish to PyPI
    needs: [validate, build, github-release]
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/spectra-suite/${{ needs.validate.outputs.version }}/

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Usa Trusted Publisher (OIDC) — nenhum token necessário
        # Configure em: pypi.org → Manage → Publishing → Add Publisher
        #   Owner:    <seu-usuario-github>
        #   Repo:     Spectra
        #   Workflow: release.yml
        #   Env:      release
