name: Release

# Disparado pelas tags geradas automaticamente a partir de pushes na main
# ou por tags criadas manualmente no formato v*.*.*.
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      ref:
        required: true
        type: string

permissions:
  contents: write   # criar GitHub Release

jobs:
  # ── 1. Garante que a tag bate com a versão declarada no pyproject.toml ───────
  validate:
    name: Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check version consistency
        id: check
        run: |
          TAG="${{ inputs.version }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/v}"
          fi
          PYPROJECT=$(python - <<'EOF'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          EOF
          )
          echo "Tag   : v$TAG"
          echo "pyproject.toml: $PYPROJECT"

          if [ "$TAG" != "$PYPROJECT" ]; then
            echo "::error title=Version Mismatch::tag=v$TAG não bate com pyproject.toml=$PYPROJECT"
            echo "Ajuste os arquivos de versao antes de criar uma tag manual ou deixe o workflow auto-release gerar a tag para voce."
            exit 1
          fi

          # Detecta se é pré-release (ex: 2.1.0-rc1, 2.1.0-beta)
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # ── 2. Roda a suite de testes antes de publicar ──────────────────────────────
  test:
    name: Test Suite
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio requests-mock

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 3. Build wheel + sdist ───────────────────────────────────────────────────
  build:
    name: Build Distribution
    needs: [validate, test]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}
          fetch-depth: 0  # histórico completo (necessário p/ setuptools_scm se usado)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel + sdist
        run: python -m build

      - name: Verify distributions
        run: twine check --strict dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/
          retention-days: 7

  # ── 4. Build dos binários standalone (PyInstaller) ──────────────────────────
  build-installers:
    name: Build Installer (${{ matrix.os }})
    needs: [validate, test]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: spectra-linux-amd64
            binary: dist/spectra
          - os: windows-latest
            artifact: spectra-windows-amd64.exe
            binary: dist/spectra.exe
          - os: macos-latest
            artifact: spectra-macos-amd64
            binary: dist/spectra

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build standalone binary
        run: pyinstaller spectra.spec --noconfirm --clean

      - name: Rename binary with platform suffix
        shell: bash
        run: |
          src="${{ matrix.binary }}"
          dst="dist/${{ matrix.artifact }}"
          if [ "$src" != "$dst" ]; then
            mv "$src" "$dst"
          fi

      - name: Generate SHA-256 checksum
        shell: bash
        run: |
          cd dist
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ matrix.artifact }}" >> checksums.sha256
          elif command -v shasum &>/dev/null; then
            shasum -a 256 "${{ matrix.artifact }}" >> checksums.sha256
          elif command -v certutil &>/dev/null; then
            certutil -hashfile "${{ matrix.artifact }}" SHA256 \
              | grep -v "^CertUtil" | grep -v "^SHA256" \
              | awk "{print \$1 \"  ${{ matrix.artifact }}\"}" >> checksums.sha256
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.artifact }}-${{ needs.validate.outputs.version }}
          path: |
            dist/${{ matrix.artifact }}
            dist/checksums.sha256
          retention-days: 7

  # ── 5. Cria a GitHub Release com os artefatos e notas do CHANGELOG ──────────
  github-release:
    name: GitHub Release
    needs: [validate, build, build-installers]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Download dist artifacts (wheel + sdist)
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.validate.outputs.version }}
          path: dist/

      - name: Download Linux installer
        uses: actions/download-artifact@v4
        with:
          name: installer-spectra-linux-amd64-${{ needs.validate.outputs.version }}
          path: installers/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-spectra-windows-amd64.exe-${{ needs.validate.outputs.version }}
          path: installers/

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-spectra-macos-amd64-${{ needs.validate.outputs.version }}
          path: installers/

      - name: Merge checksums
        run: |
          # Consolida todos os checksums.sha256 em um único arquivo
          cat installers/checksums.sha256 2>/dev/null | sort -u > dist/checksums.sha256 || true
          # Copia os binários para dist/ para facilitar o upload
          cp installers/spectra-linux-amd64   dist/ 2>/dev/null || true
          cp installers/spectra-windows-amd64.exe dist/ 2>/dev/null || true
          cp installers/spectra-macos-amd64   dist/ 2>/dev/null || true

      - name: Extract CHANGELOG entry
        id: notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md | sed '/^$/d')
          if [ -z "$NOTES" ]; then
            NOTES="Release automatica gerada a partir de push na main. Veja [CHANGELOG.md](CHANGELOG.md) e o historico de commits para detalhes."
          fi
          {
            echo "notes<<NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "---"
            echo "### Instalação rápida"
            echo '**Linux/macOS:**'
            echo '```bash'
            echo "curl -fsSL https://raw.githubusercontent.com/Estevaobonatto/Spectra/main/install.sh | bash"
            echo '```'
            echo '**Windows** (PowerShell):'
            echo '```powershell'
            echo "irm https://raw.githubusercontent.com/Estevaobonatto/Spectra/main/install.ps1 | iex"
            echo '```'
            echo '**PyPI:**'
            echo '```bash'
            echo "pip install spectra-suite==$VERSION"
            echo '```'
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.validate.outputs.version }}"
          name: "Spectra v${{ needs.validate.outputs.version }}"
          body: ${{ steps.notes.outputs.notes }}
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/spectra-linux-amd64
            dist/spectra-windows-amd64.exe
            dist/spectra-macos-amd64
            dist/checksums.sha256
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease }}
          make_latest: ${{ needs.validate.outputs.prerelease == 'false' }}

  # Publicação no PyPI é feita pelo workflow chamador (auto-release.yml)
  # para garantir compatibilidade com o Trusted Publisher OIDC do PyPI,
  # que não suporta reusable workflows como ponto de publicação.
