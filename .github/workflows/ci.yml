name: CI

on:
  push:
    branches: [main, develop]
    tags-ignore: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    if: github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):'))
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio requests-mock

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=spectra --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Lint (erros de sintaxe e imports inválidos apenas) ──────────────────────
  lint:
    if: github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):'))
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Flake8 — erros fatais
        run: flake8 spectra/ --count --select=E9,F63,F7,F82 --show-source --statistics

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    if: github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):'))
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Bandit — SAST
        run: bandit -r spectra/ -f json -o bandit-report.json -ll --exit-zero

      - name: pip-audit — dependências vulneráveis
        run: pip-audit --requirement requirements.txt --format json --output pip-audit-report.json --ignore-vuln GHSA-w596-4wvx-j9j6 || true

      - name: Upload relatórios
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.run_id }}
          path: |
            bandit-report.json
            pip-audit-report.json
          retention-days: 30