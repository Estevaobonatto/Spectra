name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bump-and-tag:
    if: github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      ref: ${{ steps.bump.outputs.ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump patch version
        id: bump
        run: |
          NEW_VERSION=$(python scripts/bump_version.py --part patch)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=refs/tags/v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit version bump and push tag
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git add pyproject.toml setup.py spectra/__init__.py
          git commit -m "chore(release): bump version to ${NEW_VERSION}"
          git tag "v${NEW_VERSION}"
          git push origin HEAD:main "v${NEW_VERSION}"

  release:
    needs: bump-and-tag
    if: needs.bump-and-tag.result == 'success'
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.bump-and-tag.outputs.version }}
      ref: ${{ needs.bump-and-tag.outputs.ref }}
    secrets: inherit